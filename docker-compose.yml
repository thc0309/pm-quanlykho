name: warehouse-suite

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warehouse_suite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_suite"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/warehouse_suite
      SESSION_SECRET: docker-dev-session-secret-change-before-production
      MASTER_EMAIL: master@example.com
      MASTER_PASSWORD: master-password-123
      WAREHOUSE_ADMIN_EMAIL: admin@example.com
      WAREHOUSE_ADMIN_PASSWORD: admin-password-123
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run db:migrate && npm run db:seed && npm run dev"

  frontend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
